server {
    listen 80;
    server_name visitorkiosk.cloud.gravesfoods.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name visitorkiosk.cloud.gravesfoods.com;

    ssl_certificate /etc/letsencrypt/live/visitorkiosk.cloud.gravesfoods.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/visitorkiosk.cloud.gravesfoods.com/privkey.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-Content-Type-Options "nosniff" always;

    # photo is base64 in print-badge payload
    client_max_body_size 25m;

    # Serve built frontend
    root /var/www/visitorkiosk;
    index index.html;

    # API -> Backend (NestJS on 4000), strip /api/
    location ^~ /api/ {
        proxy_pass http://127.0.0.1:4000/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
    }

    # Cache-bustable Vite assets
    location ^~ /assets/ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # SPA fallback (React Router)
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store";
    }

    # Block sensitive stuff
    location ~* \.(git|env|log|bak|swp|old|zip|sql|tar|gz)$ { deny all; }
}
